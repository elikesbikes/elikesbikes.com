# Blowfish theme parameters

# Keep your background color
background = "#0f1720"

# Optional light background color (if you want dark/light toggle later)
lightBackground = "#f8fafc"

# Site identity
[author]
  name = "Eli"
  headline = "Tech, Bikes, and Learning"
  bio = "I share educational videos about tech, programming, and tools I use every day."
  image = "images/profile.jpg" # already in your repo

# Header behavior
[header]
  layout = "fixed"      # fixed header at top
  showTitle = true
  showLogo = true
  showNav = true

# Footer options (you can expand later)
[footer]
  showCopyright = true
  showSocial = true

# Social links — update these later with your own handles
[[social]]
  name = "YouTube"
  url = "https://www.youtube.com/@elikesbikes"
  icon = "youtube"

[[social]]
  name = "GitHub"
  url = "https://github.com/elikesbikes"
  icon = "github"

