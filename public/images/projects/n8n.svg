<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1720"/>
      <stop offset="100%" style="stop-color:#111b2a"/>
    </linearGradient>
    <linearGradient id="n8nGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA4B71;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#EA4B71;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2d3748"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2535" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)" opacity="0.6"/>

  <!-- n8n center glow -->
  <circle cx="400" cy="225" r="90" fill="url(#n8nGlow)"/>

  <!-- Connection lines (behind nodes) -->
  <!-- n8n to Home Assistant -->
  <line x1="400" y1="225" x2="185" y2="150" stroke="#2d3748" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.8"/>
  <!-- n8n to Garmin -->
  <line x1="400" y1="225" x2="185" y2="310" stroke="#2d3748" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.8"/>
  <!-- n8n to Proxmox -->
  <line x1="400" y1="225" x2="615" y2="150" stroke="#2d3748" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.8"/>
  <!-- n8n to Unifi -->
  <line x1="400" y1="225" x2="615" y2="310" stroke="#2d3748" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.8"/>
  <!-- n8n to Graylog -->
  <line x1="400" y1="225" x2="400" y2="55" stroke="#2d3748" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.8"/>

  <!-- Animated data flow dots on lines -->
  <!-- Top -->
  <circle r="3" fill="#EA4B71" opacity="0.8">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M400,225 L400,55"/>
  </circle>
  <!-- Left-top -->
  <circle r="3" fill="#EA4B71" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M400,225 L185,150"/>
  </circle>
  <!-- Left-bottom -->
  <circle r="3" fill="#EA4B71" opacity="0.8">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M400,225 L185,310"/>
  </circle>
  <!-- Right-top -->
  <circle r="3" fill="#EA4B71" opacity="0.8">
    <animateMotion dur="2.8s" repeatCount="indefinite" path="M400,225 L615,150"/>
  </circle>
  <!-- Right-bottom -->
  <circle r="3" fill="#EA4B71" opacity="0.8">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M400,225 L615,310"/>
  </circle>

  <!-- === n8n CENTER NODE === -->
  <rect x="340" y="185" width="120" height="80" rx="12" fill="#1a2535" stroke="#EA4B71" stroke-width="2" filter="url(#softglow)"/>
  <!-- n8n logo text -->
  <text x="400" y="222" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-weight="900" font-size="28" fill="#EA4B71" filter="url(#glow)">n8n</text>
  <text x="400" y="245" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8892a4" letter-spacing="2">WORKFLOW</text>

  <!-- === HOME ASSISTANT NODE (top-left) === -->
  <rect x="125" y="110" width="120" height="80" rx="10" fill="#1a2535" stroke="#2d3748" stroke-width="1.5"/>
  <!-- HA icon - simplified house -->
  <g transform="translate(157, 128)">
    <polygon points="28,0 56,24 52,24 52,52 32,52 32,36 24,36 24,52 4,52 4,24 0,24" fill="#03a9f4" opacity="0.9"/>
    <rect x="20" y="30" width="16" height="22" fill="#1a2535"/>
  </g>
  <text x="185" y="177" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#e6edf3">Home Assistant</text>

  <!-- === GARMIN NODE (bottom-left) === -->
  <rect x="125" y="270" width="120" height="80" rx="10" fill="#1a2535" stroke="#2d3748" stroke-width="1.5"/>
  <!-- Garmin icon - simplified activity watch -->
  <g transform="translate(163, 288)">
    <circle cx="22" cy="26" r="20" fill="none" stroke="#00b3e3" stroke-width="3"/>
    <circle cx="22" cy="26" r="14" fill="#0d1117"/>
    <polyline points="22,16 22,26 30,30" stroke="#00b3e3" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>
  <text x="185" y="337" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#e6edf3">Garmin</text>

  <!-- === GRAYLOG NODE (top-center) === -->
  <rect x="340" y="15" width="120" height="80" rx="10" fill="#1a2535" stroke="#2d3748" stroke-width="1.5"/>
  <!-- Graylog icon - magnifying glass / log search -->
  <g transform="translate(368, 30)">
    <circle cx="24" cy="22" r="14" fill="none" stroke="#ff3c00" stroke-width="3"/>
    <line x1="34" y1="32" x2="46" y2="44" stroke="#ff3c00" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="18" y1="18" x2="30" y2="18" stroke="#ff3c00" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="18" y1="23" x2="28" y2="23" stroke="#ff3c00" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  <text x="400" y="80" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#e6edf3">Graylog</text>

  <!-- === PROXMOX NODE (top-right) === -->
  <rect x="555" y="110" width="120" height="80" rx="10" fill="#1a2535" stroke="#2d3748" stroke-width="1.5"/>
  <!-- Proxmox icon - server/VM boxes -->
  <g transform="translate(583, 125)">
    <rect x="0" y="0" width="28" height="20" rx="3" fill="#e57000" opacity="0.9"/>
    <rect x="32" y="0" width="28" height="20" rx="3" fill="#e57000" opacity="0.6"/>
    <rect x="0" y="24" width="28" height="20" rx="3" fill="#e57000" opacity="0.6"/>
    <rect x="32" y="24" width="28" height="20" rx="3" fill="#e57000" opacity="0.3"/>
    <rect x="4" y="4" width="20" height="3" rx="1" fill="#fff" opacity="0.4"/>
    <rect x="4" y="9" width="12" height="3" rx="1" fill="#fff" opacity="0.4"/>
  </g>
  <text x="615" y="177" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#e6edf3">Proxmox</text>

  <!-- === UNIFI NODE (bottom-right) === -->
  <rect x="555" y="270" width="120" height="80" rx="10" fill="#1a2535" stroke="#2d3748" stroke-width="1.5"/>
  <!-- Unifi icon - wifi signal arcs -->
  <g transform="translate(593, 285)">
    <circle cx="22" cy="42" r="5" fill="#006fff"/>
    <path d="M10,32 Q22,18 34,32" stroke="#006fff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M2,22 Q22,2 42,22" stroke="#006fff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  <text x="615" y="337" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#e6edf3">Unifi</text>

  <!-- Bottom label -->
  <text x="400" y="420" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8892a4" letter-spacing="1">Visual Workflow Automation</text>

  <!-- Corner badge -->
  <rect x="16" y="16" width="90" height="24" rx="12" fill="#EA4B71" opacity="0.15"/>
  <text x="61" y="32" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#EA4B71">homelab</text>
</svg>
