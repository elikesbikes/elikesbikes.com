{{ define "main" }}
<main style="max-width:1100px; margin:0 auto; padding:2rem 1.5rem;">

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem;">
    <div>
      <h1 style="font-size:2rem; margin:0 0 0.25rem;">Videos</h1>
      <p style="color:#8892a4; margin:0;">{{ len .Pages }} videos from the channel</p>
    </div>
    <a href="https://www.youtube.com/@ELIKESBIKES" target="_blank" rel="noopener"
       style="display:inline-flex; align-items:center; gap:0.5rem; background:#ff0000; color:#fff;
              padding:0.5rem 1.2rem; border-radius:6px; text-decoration:none; font-weight:600; font-size:0.9rem;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M23.5 6.2s-.2-1.7-1-2.4c-.9-1-1.9-1-2.4-1.1C17.1 2.5 12 2.5 12 2.5s-5.1 0-8.1.2c-.5.1-1.5.1-2.4 1.1-.7.7-1 2.4-1 2.4S.3 8.1.3 10v1.8c0 1.9.2 3.8.2 3.8s.2 1.7 1 2.4c.9 1 2.1.9 2.6 1C5.8 19.2 12 19.2 12 19.2s5.1 0 8.1-.2c.5-.1 1.5-.1 2.4-1.1.7-.7 1-2.4 1-2.4s.2-1.9.2-3.8V10c0-1.9-.2-3.8-.2-3.8zM9.7 14.5V8.4l6.5 3.1-6.5 3z"/></svg>
      Subscribe on YouTube
    </a>
  </div>

  <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:1.5rem;">
    {{ range .Pages.ByDate.Reverse }}
      <article style="background:#1a2535; border:1px solid #2d3748; border-radius:10px; overflow:hidden;"
               onmouseover="this.style.borderColor='#7fb3f5'" onmouseout="this.style.borderColor='#2d3748'">

        <!-- Thumbnail -->
        <a href="https://www.youtube.com/watch?v={{ .Params.youtube_id }}" target="_blank" rel="noopener" style="display:block; position:relative; aspect-ratio:16/9; overflow:hidden; background:#0d1117;">
          <img
            src="https://img.youtube.com/vi/{{ .Params.youtube_id }}/hqdefault.jpg"
            alt="{{ .Title }}"
            style="width:100%; height:100%; object-fit:cover; display:block;"
            loading="lazy"
          />
          <!-- Play overlay -->
          <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
                      background:rgba(0,0,0,0); transition:background 0.2s;"
               onmouseover="this.style.background='rgba(0,0,0,0.4)'; this.querySelector('div').style.opacity='1'"
               onmouseout="this.style.background='rgba(0,0,0,0)'; this.querySelector('div').style.opacity='0'">
            <div style="opacity:0; width:56px; height:56px; background:rgba(255,0,0,0.9); border-radius:50%;
                        display:flex; align-items:center; justify-content:center; transition:opacity 0.2s;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
            </div>
          </div>
        </a>

        <!-- Card body -->
        <div style="padding:1rem;">
          <h3 style="margin:0 0 0.5rem; font-size:0.95rem; line-height:1.4;">
            <a href="https://www.youtube.com/watch?v={{ .Params.youtube_id }}" target="_blank" rel="noopener" style="color:#e6edf3; text-decoration:none;">{{ .Title }}</a>
          </h3>
          <p style="color:#8892a4; font-size:0.8rem; margin:0 0 0.75rem;">
            {{ .Date.Format "January 2, 2006" }}
          </p>
          {{ if .Params.tags }}
            <div style="display:flex; gap:0.4rem; flex-wrap:wrap;">
              {{ range .Params.tags }}
                <span style="background:#0d2137; color:#7fb3f5; padding:0.15rem 0.6rem; border-radius:999px; font-size:0.75rem;">{{ . }}</span>
              {{ end }}
            </div>
          {{ end }}
        </div>

      </article>
    {{ end }}
  </div>

</main>
{{ end }}
