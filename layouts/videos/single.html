{{ define "main" }}
<main style="max-width:900px; margin:0 auto; padding:2rem 1.5rem;">

  <!-- Back link -->
  <a href="/videos/" style="color:#8892a4; text-decoration:none; font-size:0.875rem; display:inline-flex; align-items:center; gap:0.4rem; margin-bottom:1.5rem;">
    ← Back to Videos
  </a>

  <!-- Title -->
  <h1 style="font-size:1.75rem; margin:0 0 0.5rem; line-height:1.3;">{{ .Title }}</h1>
  <p style="color:#8892a4; font-size:0.875rem; margin:0 0 1.25rem;">
    {{ .Date.Format "January 2, 2006" }}
  </p>

  <!-- Tags -->
  {{ if .Params.tags }}
    <div style="display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1.5rem;">
      {{ range .Params.tags }}
        <span style="background:#1e3a5f; color:#7fb3f5; padding:0.25rem 0.75rem; border-radius:999px; font-size:0.8rem;">{{ . }}</span>
      {{ end }}
    </div>
  {{ end }}

  <!-- Embedded YouTube player (responsive 16:9) -->
  <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:10px; background:#0d1117; margin-bottom:1.5rem;">
    <iframe
      src="https://www.youtube.com/embed/{{ .Params.youtube_id }}"
      title="{{ .Title }}"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
      style="position:absolute; top:0; left:0; width:100%; height:100%;">
    </iframe>
  </div>

  <!-- Description -->
  {{ with .Params.description }}
    <p style="color:#c9d1d9; line-height:1.75; margin:0 0 1.5rem;">{{ . }}</p>
  {{ end }}

  <!-- YouTube link -->
  <a href="https://www.youtube.com/watch?v={{ .Params.youtube_id }}" target="_blank" rel="noopener"
     style="display:inline-flex; align-items:center; gap:0.5rem; color:#8892a4; text-decoration:none; font-size:0.875rem;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="#ff4444"><path d="M23.5 6.2s-.2-1.7-1-2.4c-.9-1-1.9-1-2.4-1.1C17.1 2.5 12 2.5 12 2.5s-5.1 0-8.1.2c-.5.1-1.5.1-2.4 1.1-.7.7-1 2.4-1 2.4S.3 8.1.3 10v1.8c0 1.9.2 3.8.2 3.8s.2 1.7 1 2.4c.9 1 2.1.9 2.6 1C5.8 19.2 12 19.2 12 19.2s5.1 0 8.1-.2c.5-.1 1.5-.1 2.4-1.1.7-.7 1-2.4 1-2.4s.2-1.9.2-3.8V10c0-1.9-.2-3.8-.2-3.8zM9.7 14.5V8.4l6.5 3.1-6.5 3z"/></svg>
    Watch on YouTube
  </a>

</main>
{{ end }}
