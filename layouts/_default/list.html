{{ define "main" }}
  <main>
    <h1>{{ .Title }}</h1>

    {{ if or (eq .Kind "taxonomy") (eq .Kind "taxonomyTerm") }}
      <p>Showing content for: {{ .Title }}</p>
    {{ end }}

    <ul>
      {{ range .Pages.ByDate.Reverse }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a> — {{ .Date.Format "2006-01-02" }}</li>
      {{ end }}
    </ul>
  </main>
{{ end }}
